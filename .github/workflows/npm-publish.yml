# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: '24.x'
      - run: |
            git config --global user.name "kitt-digital"
            git config --global user.email "169592437+kitt-digital@users.noreply.github.com"
            git remote set-url origin https://x-access-token:${{ secrets.PAT }}@github.com/kitt-digital/react-ts-kitt.git
            git checkout main
            echo "const a = 5;" >> test.js
            git add test.js
            git commit -m "Add test.js"
            git push
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          NPM_TOKEN: ${{ secrets.NPM }}
