# Fine-grained personal access tokens
# Repository permissions:
#   Read access: actions, variables, metadata, secrets
#   Read and Write access: contents, commit statuses, issues, pull requests
# User permissions:
#   - none
name: Publish Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read # for checkout

jobs:
  install-dependencies:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Install dependencies
        run: npm install
      - name: Ensure the integrity of packages from the public npm registry
        run: npm audit signatures

  bundle:
    name: Bundle
    runs-on: ubuntu-latest
    needs: install-dependencies
    steps:
      - name: Bundle
        run: npm run build

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [install-dependencies, bundle]
    environment: publish
    permissions:
      contents: write # to be able to publish a GitHub release
      issues: write # to be able to comment on released issues
      pull-requests: write # to be able to comment on released pull requests
      id-token: write # to enable use of OIDC for npm provenance
    steps:
      - name: Publish
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
          NPM_TOKEN: ${{ secrets.NPM }}
        run: npx semantic-release